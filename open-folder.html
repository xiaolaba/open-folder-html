		<script>
		function openLocalFolder(path) {
			// 使用 UTF-8 方式進行 Base64 編碼，確保中英文與符號完美相容
			const utf8Bytes = new TextEncoder().encode(path);
			let binString = "";
			for (let i = 0; i < utf8Bytes.length; i++) {
				binString += String.fromCharCode(utf8Bytes[i]);
			}
			const base64Path = btoa(binString);
			
			// 呼叫協定
			window.location.href = "myexplorersubfolder://" + base64Path;
		}
		</script>
